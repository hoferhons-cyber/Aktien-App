<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hansilaris Web App</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        body {
            font-family: Arial, sans-serif;
            background-image: url('background.png'); /* dein Comic-Bild */
            background-size: cover;                  /* Bild füllt den Bildschirm */
            background-repeat: no-repeat;
            background-position: center top;
        }

        header {
            height: 100vh;       /* Header = ganze Bildschirmhöhe */
        }

        main {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .block {
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.6);
            margin-top: 40px;
        }
    </style>
</head>

<body>

<header></header>

<main>
    <div class="block">
        <h2>Willkommen</h2>
        <p>Hier kannst du deinen Text einfügen.</p>
    </div>
</main>

<footer>
    © 2026 Hansilaris Web App
</footer>

</body>
</html>
