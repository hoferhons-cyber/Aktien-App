<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hansilaris Web App</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        body {
            font-family: Arial, sans-serif;
            color: #fff;
            background-image: url('background.png'); /* dein Comic-Bild */
            background-size: cover;                  /* Bild füllt den Bildschirm */
            background-repeat: no-repeat;
            background-position: center top;
        }

        header {
            height: 100vh;       /* Header = ganze Bildschirmhöhe */
        }

        main {
            max-width: 900px;
            margin: 40px 0 0 20px;
            padding: 0 20px 0 0;
        }

        .block {
            display: inline-block;
            background: rgba(255, 255, 255, 0.15);
            padding: 14px 18px;
            margin: 20px 0;
            max-width: 520px;
            width: auto;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(6px);
        }

        .link-button {
            display: inline-block;
            padding: 14px 24px;
            color: #fff;
            background: #ff0000;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .link-button:hover {
            background: #cc0000;
            transform: translateY(-1px);
        }

        footer {
            text-align: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.6);
            margin-top: 40px;
        }
    </style>
</head>

<body>

<header></header>

<main>
    <div class="block">
        <h2>Willkommen</h2>
        <p>Auf dieser Website übe ich programmieren.</p>
    
    </div>

    <div class="block">
        <h2>Klettervideos</h2>
        <p>Hier geht es zu meinen Klettervideos:</p>
        <a class="link-button" href="klettervideos.html">
            zu meinen klettervideos
        </a>
    </div>

    <div class="block">
        <h2>Timer</h2>
        <p>Starte deinen Trainings-Timer mit einem Klick auf die gewünschte Laufzeit.</p>
        <a class="link-button" href="timer.html">
            zu meinem timer
        </a>
    </div>
</main>

<footer>
    © 2026 Hansilaris Web App
</footer>

</body>
</html>
