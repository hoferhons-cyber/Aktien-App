<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klettervideos</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        body {
            position: relative;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            color: #fff;
            background-image: url('background.png');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center top;
        }

        main {
            max-width: 900px;
            margin: 0;
            padding: 0;
        }

        .block {
            position: fixed;
            left: 20px;
            bottom: 20px;
            background: rgba(255, 255, 255, 0.15);
            padding: 18px;
            max-width: 480px;
            width: auto;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(6px);
            z-index: 10;
        }

        .video-container {
            position: relative;
            width: 100%;
            max-width: 560px;
            margin: 20px 0 0;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            background: #000;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .video-link {
            display: inline-block;
            margin-top: 12px;
            margin-right: 12px;
            padding: 12px 20px;
            color: #fff;
            background: #ff0000;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: background 0.2s ease;
        }

        .video-link:hover {
            background: #cc0000;
        }

        .back-link {
            display: inline-block;
            margin-top: 12px;
            padding: 12px 20px;
            color: #fff;
            background: rgba(255, 255, 255, 0.12);
            text-decoration: none;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        footer {
            text-align: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.6);
            margin-top: 40px;
        }
    </style>
</head>

<body>

<header></header>

<main>
    <div class="block">
        <h2>Klettervideos</h2>
        <p>Klicke auf den Button, um das Video direkt auf YouTube zu öffnen:</p>
        <a class="video-link" href="https://www.youtube.com/watch?v=BkNITo01IIQ" target="_blank" rel="noopener noreferrer">
            Zum Video auf YouTube
        </a>
        <a class="back-link" href="index.html">Home</a>
    </div>
</main>

<footer>
    © 2026 Hansilaris Web App
</footer>

</body>
</html>
